      <div class="write_bottom">
        <button type="button" class="btn_cancel">취소</button>

    <div class="popup" id="writePopup">
      <div class="popup_inner">
        <div class="popup_header">
          <span>글쓰기</span>
          <button type="button" class="popup_x">X</button>
        </div>

        <div class="popup_body">
          <p>글 작성을 취소하시겠습니까?</p>

          <div class="popup_btns">
            <button type="button" class="popup_cancel">취소</button>
            <button type="button" class="popup_confirm">확인</button>
          </div>
        </div>
      </div>
    </div>
    <!-- 글쓰기 팝업창 -->

    <script
      src="https://kit.fontawesome.com/fb27592f06.js"
      crossorigin="anonymous"
    ></script>
    <script src="../assets/js/include.js"></script>
    <script>
      /* =========================
     요소 선택
  ========================= */
      const popup = document.getElementById("writePopup");
      const cancelBtn = document.querySelector(".btn_cancel");
      const submitBtn = document.querySelector(".btn_submit");
      const popupCancel = document.querySelector(".popup_cancel");
      const popupConfirm = document.querySelector(".popup_confirm");
      const popupX = document.querySelector(".popup_x");
      const popupText = document.querySelector(".popup_body p");

      const titleInput = document.querySelector(".write_title_box input");
      const contentInput = document.querySelector(
        ".write_content_box textarea",
      );

      /* =========================
     상태값 (취소 / 저장 구분)
  ========================= */
      let popupMode = "cancel";

      /* =========================
     팝업 열기 / 닫기
  ========================= */
      function openPopup() {
        popup?.classList.add("show");
      }

      function closePopup() {
        popup?.classList.remove("show");
      }

      /* =========================
     취소 버튼
  ========================= */
      cancelBtn?.addEventListener("click", () => {
        popupMode = "cancel";
        popupText.textContent = "글 작성을 취소하시겠습니까?";
        openPopup();
      });

      /* =========================
     작성완료 버튼
  ========================= */
      submitBtn?.addEventListener("click", () => {
        const title = titleInput.value.trim();
        const content = contentInput.value.trim();

        // ❌ 내용 없을 때
        if (!content) {
          alert("내용을 입력하세요.");
          return;
        }

        // ⭕ 저장 팝업
        popupMode = "save";
        popupText.textContent = "저장하시겠습니까?";
        openPopup();
      });

      /* =========================
     팝업 닫기
  ========================= */
      popupCancel?.addEventListener("click", closePopup);
      popupX?.addEventListener("click", closePopup);

      popup?.addEventListener("click", (e) => {
        if (e.target === popup) closePopup();
      });

      /* =========================
     팝업 확인 버튼
  ========================= */
      popupConfirm?.addEventListener("click", () => {
        closePopup();

        if (popupMode === "cancel") {
          window.location.href = "../page/community.html";
        }

        if (popupMode === "save") {
          window.location.href = "../page/community.html";
        }
      });

      /* =========================
     textarea 자동 높이
  ========================= */
      function autoResize(el) {
        if (!el) return;
        el.style.height = "auto";
        el.style.height = el.scrollHeight + "px";
      }

      if (contentInput) {
        autoResize(contentInput);
        contentInput.addEventListener("input", () => autoResize(contentInput));
      }

      /* =========================
     버튼 색상 교환 hover
  ========================= */
      function bindSwapHover(btnA, btnB, activeStyle, defaultStyle) {
        if (!btnA || !btnB) return;

        btnA.addEventListener("mouseenter", () => {
          Object.assign(btnA.style, activeStyle);
          Object.assign(btnB.style, defaultStyle);
        });

        btnA.addEventListener("mouseleave", () => {
          Object.assign(btnA.style, defaultStyle);
          Object.assign(btnB.style, activeStyle);
        });

        btnB.addEventListener("mouseenter", () => {
          Object.assign(btnB.style, activeStyle);
          Object.assign(btnA.style, defaultStyle);
        });

        btnB.addEventListener("mouseleave", () => {
          Object.assign(btnB.style, defaultStyle);
          Object.assign(btnA.style, activeStyle);
        });
      }

      // 팝업 버튼
      bindSwapHover(
        popupCancel,
        popupConfirm,
        {
          background: "#ff7f7f",
          color: "#fff",
          border: "1px solid #ff7f7f",
        },
        {
          background: "#fff",
          color: "#d26d6d",
          border: "1px solid #f4a3a3",
        },
      );
    </script>
    <script>
      const selectBox = document.querySelector(".category_select");
      const selected = selectBox.querySelector(".selected");
      const options = selectBox.querySelectorAll(".select_list li");
      const list = selectBox.querySelector(".select_list");

      // 열기 / 닫기
      selected.addEventListener("click", () => {
        list.style.display = list.style.display === "block" ? "none" : "block";
      });

      // 값 선택
      options.forEach((option) => {
        option.addEventListener("click", () => {
          selected.textContent = option.textContent;
          list.style.display = "none";
        });
      });

      // 바깥 클릭 시 닫기
      document.addEventListener("click", (e) => {
        if (!selectBox.contains(e.target)) {
          list.style.display = "none";
        }
      });
    </script>
