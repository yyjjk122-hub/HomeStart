<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/css/setting/reset.css" />
    <link rel="stylesheet" href="../assets/css/setting/font.css" />
    <link rel="stylesheet" href="../assets/css/hunting_checklist.css" />
    <link rel="stylesheet" href="../assets/css/setting/header.css" />

    <title>홈스타트 집구하기 체크리스트</title>
  </head>
  <body>
    <div id="header"></div>
    <!-- header -->
    <main id="checklist">
      <div class="img_checklist">
        <div class="checklist_title">체크리스트</div>
        <div class="checklist_desc">
          <h1>내부</h1>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">햇빛은 잘 들어오나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">물이 샌(누수) 흔적은 없나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text"
                >천장이나 벽, 장판 아래 곰팡이가 피어 있는 곳은 없나요?</span
              >
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">환기가 잘 되나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">외풍이 심하지 않나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">윗집이 시끄럽지 않나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">발코니는 있나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">빨래를 건조할 수 있는 공간이 있나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text"
                >방의 높이나 문의 크기가 옷장이 들어갈 수 있나요?</span
              >
            </label>
          </div>
          <h1>시설물 상태</h1>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">전등은 잘 들어오나요? (전구역)</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text"
                >수도는 잘 나오나요? (부엌, 화장실, 세탁실)</span
              >
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">배수는 잘 되나요? (부엌, 화장실, 세탁실)</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text"
                >싱크대, 후드, 수납장 등 파손된 주방시설은 없나요?</span
              >
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">냉장고를 놓을 수 있는 공간이 있나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text"
                >욕실의 변기나 샤워기, 거울 등 파손된 시설은 없나요?</span
              >
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">세탁기를 놓을 수 있는 공간이 있나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">전기콘센트는 파손된 곳이 없나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">전기와 수도 계량기는 별도로 사용하나요?</span>
            </label>
          </div>
          <h1>안전</h1>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">방충망이나 방범창이 있나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">주 출입구에 방범시설이 되어 있나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">CCTV는 설치가 되어 있나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">주차장은 있나요?</span>
            </label>
          </div>
          <h1>입지환경</h1>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text"
                >집 주변에 공장이나 소음유발 시설은 없나요?</span
              >
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">집 주변에 악취유발 시설은 없나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">집 주변에 혐오시설은 없나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text"
                >집에서 학교, 어린이집, 학원 등은 가까운가요?</span
              >
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">집에서 병원은 가까운가요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text"
                >지하철이나 버스정류장이 도보로 10분 이내인가요?</span
              >
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">집이 너무 외진 곳에 있지 않나요?</span>
            </label>
          </div>
          <h1>금융</h1>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text"
                >저당금액과 총보증금의 합이 집값의 60%를 넘나요?</span
              >
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">서류들의 내용이 서로 일치하나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">집을 내놨을 때 잘 나갈 수 있나요?</span>
            </label>
          </div>
          <div class="check_item">
            <label>
              <input type="checkbox" class="chk" />
              <i class="check">□</i>
              <span class="text">관리비는 비싸지 않나요?</span>
            </label>
          </div>
          <div class="checklist_count">
            <em>33개 항목 중</em>
            <span>0</span>
            <em>개 선택됨</em>
          </div>
        </div>
        <div class="checklist_btn">
          <div class="reset_btn"><button>Reset</button></div>
          <div class="save_btn"><button>Save</button></div>
          <div class="save_modal">저장되었습니다.</div>
        </div>
        <div class="close_btn"><a href="house_hunting.html">Close</a></div>
      </div>
    </main>

    <!-- checklist -->
    <div id="footer"></div>
    <!-- footer -->

    <script>
      const checkboxes = document.querySelectorAll(".chk");
      const counter = document.querySelector(".checklist_count span");
      const resetBtn = document.querySelector(".reset_btn");

      function updateCount() {
        counter.textContent = document.querySelectorAll(".chk:checked").length;
      }

      checkboxes.forEach((chk) => {
        chk.addEventListener("change", updateCount);
      });

      resetBtn.addEventListener("click", () => {
        checkboxes.forEach((chk) => {
          chk.checked = false;
        });
        updateCount();
      });
      // 체크박스 카운트&리셋버튼

      const saveBtn = document.querySelector(".save_btn");
      const saveModal = document.querySelector(".save_modal");

      saveBtn.addEventListener("click", () => {
        saveModal.classList.add("show");

        setTimeout(() => {
          saveModal.classList.remove("show");
        }, 1500);
      });
      // 저장 안내창 모달
    </script>
    <script src="../assets/js/include.js"></script>
  </body>
</html>
